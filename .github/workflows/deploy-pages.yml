name: Deploy to GitHub Pages

# 推送到开发分支或手动触发时，把静态站点发布到 GitHub Pages。
on:
  push:
    branches:
      - main
      - claude/sky-game-web-gn75ez
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个发布，新推送取消进行中的旧发布
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 游戏是纯静态站点，整库根目录即可发布（node_modules 已被 .gitignore 排除）
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
